
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Adventure: Gorstan Protocols</title>
  <style>
    body {
      background-color: #0e0e10;
      color: #c7f0ff;
      font-family: 'Courier New', Courier, monospace;
      padding: 2rem;
      line-height: 1.6;
    }
    #output {
      white-space: pre-wrap;
      background-color: #1b1b1f;
      padding: 1rem;
      border-radius: 8px;
      height: 400px;
      overflow-y: scroll;
      margin-bottom: 1rem;
    }
    #inputArea {
      display: flex;
      gap: 1rem;
    }
    input[type="text"] {
      flex-grow: 1;
      padding: 0.5rem;
      font-size: 1rem;
      background: #222;
      color: #fff;
      border: 1px solid #555;
      border-radius: 4px;
    }
    button {
      padding: 0.5rem 1rem;
      background-color: #3a9bdc;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #347fb5;
    }
  </style>
</head>
<body>
  <h1>New Adventure: Gorstan Protocols</h1>
  <div id="output"></div>
  <div id="inputArea">
    <input type="text" id="command" placeholder="Type a command..." autofocus />
    <button onclick="submitCommand()">Enter</button>
  </div>
  <script>
    const output = document.getElementById("output");
    const commandInput = document.getElementById("command");

    let premiumUnlocked = false;

    const introText = `Support the author: https://www.buymeacoffee.com/gorstan\nType 'premium' if you've unlocked premium access.\n\nWelcome to New Adventure: Gorstan Protocols\nSimulation Mode: Dale Whyte Anomaly Trace\nUniverse Branch: 4-Aether-Delta\nTime Index: [Unstable]\n\nYou awaken in a dim, octagonal chamber of polished obsidian.\nAl, the Guardian, hovers beside you.\n\n(Type 'support' to help expand the story.)`;

    let history = [];

    function submitCommand() {
      const cmd = commandInput.value.trim().toLowerCase();
      commandInput.value = "";
      if (!cmd) return;
      history.push(`> ${cmd}`);
      processCommand(cmd);
    }

    function processCommand(cmd) {
      switch (cmd) {
        case "support":
          history.push("Support the author: https://www.buymeacoffee.com/gorstan\nEvery supporter unlocks exclusive lore.");
          break;
        case "premium":
          premiumUnlocked = true;
          history.push("Premium access unlocked. New paths now open.");
          break;
        case "journal":
          history.push("Your Journal:\n- [Example Entry]\n(Your actions will update this in future versions.)");
          break;
        default:
          history.push(`You entered: ${cmd} (command system under development)`);
      }
      renderOutput();
    }

    function renderOutput() {
      output.textContent = [...history].join("\n\n");
      output.scrollTop = output.scrollHeight;
    }

    // Initial render
    history.push(introText);
    renderOutput();
  </script>
</body>
</html>
