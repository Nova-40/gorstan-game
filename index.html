<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Adventure: Gorstan Protocols</title>
  <style>
    body {
      background-color: #111;
      color: #eee;
      font-family: 'Courier New', monospace;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
    }
    header {
      padding: 20px;
      text-align: center;
      background-color: #222;
      width: 100%;
    }
    #game-container {
  width: 90%;
  max-width: 800px;
  margin: 20px auto;
  padding-bottom: 80px; /* ensure space for input */
  background-color: #1c1c1c;
  border-radius: 8px;
  box-shadow: 0 0 10px rgba(255,255,255,0.1);
  position: relative;
}
    #output {
      white-space: pre-wrap;
      min-height: 300px;
      margin-bottom: 20px;
    }
    #input-container {
  display: flex;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  width: 100%;
  max-width: 800px;
  margin: 0 auto;
  background-color: #1c1c1c;
  padding: 10px;
  box-shadow: 0 -2px 8px rgba(0,0,0,0.4);
}
    #command-input {
      flex: 1;
      padding: 10px;
      font-size: 1em;
      border: none;
      border-radius: 4px 0 0 4px;
    }
    #submit-button {
      padding: 10px 20px;
      font-size: 1em;
      border: none;
      background-color: #4caf50;
      color: white;
      cursor: pointer;
      border-radius: 0 4px 4px 0;
    }
    #submit-button:hover {
      background-color: #45a049;
    }
    .link {
      color: #4fa3ff;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header>
    <h1>New Adventure: Gorstan Protocols</h1>
    <p>Explore the multiverse. Type your commands below or use arrow keys to move.</p>
  </header>
  <div id="game-container">
    <div id="output">Welcome to Gorstan Protocols.<br><br>Start your journey beyond the screen!<br><a class="link" href="https://www.amazon.co.uk/s?k=B0DQV5XQMV&ref=404_search" target="_blank">Explore The Gorstan Chronicles on Amazon UK</a><br><br>

Type "help" for a list of available commands.</div>
    <div id="input-container">
      <input type="text" id="command-input" placeholder="Enter command..." autofocus />
      <button id="submit-button">Enter</button>
    </div>
  </div>

  <script>
    const output = document.getElementById('output');
    const input = document.getElementById('command-input');
    const button = document.getElementById('submit-button');

    let state = {
      currentRoom: 'outcrop',
      inventory: ['Lattice Fragment', 'Memory Stone', 'Gorstan Beacon']
    };

    const rooms = {
      outcrop: {
        description: 'You are standing on a rocky outcrop overlooking the multiverse fracture. The Lattice hums beneath your feet.',
        exits: { north: 'control_room' },
        npcs: ['Watcher']
      },
      control_room: {
        description: 'You step into a dimly lit control room filled with flickering panels and humming machinery. A memory console glows faintly in the corner.',
        exits: { south: 'outcrop', east: 'observation_deck' },
        npcs: ['Morthos']
      },
      observation_deck: {
        description: 'Through transparent alloy walls, the entire multiversal expanse unfolds before you. You feel impossibly small.',
        exits: { west: 'control_room' },
        npcs: []
      }
    };

    const npcDialogues = {
  Watcher: [
    'The Watcher blinks slowly. "Do you know why the fracture formed?"',
    '1) Yes, it was inevitable.',
    '2) No, tell me.',
    '3) I don’t care.',
    'Choose: 1, 2, or 3'
  ],
  Morthos: [
    'Morthos studies you. "Are you here to help us or delay the collapse?"',
    '1) I’ll help however I can.',
    '2) I just want answers.',
    '3) That depends—who are you really?',
    'Choose: 1, 2, or 3'
  ]
};

    function appendOutput(text) {
      output.innerHTML += '<br><br>' + text;
      output.scrollTop = output.scrollHeight;
    }

    function describeCurrentRoom() {
      const room = rooms[state.currentRoom];
      let desc = room.description + '<br>Exits: ' + Object.keys(room.exits).join(', ');
      if (room.npcs.length > 0) {
        desc += '<br>You see: ' + room.npcs.join(', ');
      }
      appendOutput(desc);
    }

    let currentDialogue = null;

function handleCommand(command) {
      const cmd = command.trim().toLowerCase();

      if (!cmd) return;

      if (currentDialogue && ['1','2','3'].includes(cmd)) {
  handleDialogueResponse(cmd);
  return;
}

switch(cmd) {
  case 'exit':
  case 'quit':
    appendOutput('Thank you for playing. You may now close the browser or tab.');
    return;
        case 'help':
          appendOutput('Available commands: look, speak, talk, inventory, save, load, north, south, east, west, help, exit, quit');
          break;
        case 'look':
          describeCurrentRoom();
          break;
        case 'speak':
        case 'talk':
          speakToNPC();
          break;
        case 'inventory':
          appendOutput('Inventory: ' + state.inventory.join(', '));
          break;
        case 'save':
          localStorage.setItem('gorstanSave', JSON.stringify(state));
          const region = navigator.language.startsWith('en-GB') ? 'co.uk' : 'com';
          appendOutput(
            'Game saved.<br><br>Thank you for playing! Continue the adventure by exploring the books.<br>' +
            `Find them on Amazon: <a class="link" href="https://www.amazon.${region}/s?k=B0DQV5XQMV&ref=404_search" target="_blank">The Gorstan Chronicles</a>`
          );
          break;
        case 'load':
          const saved = localStorage.getItem('gorstanSave');
          if (saved) {
            state = JSON.parse(saved);
            appendOutput('Game loaded.');
            describeCurrentRoom();
          } else {
            appendOutput('No saved game found.');
          }
          break;
        case 'north':
        case 'south':
        case 'east':
        case 'west':
          move(cmd);
          break;
        default:
          appendOutput(`Unrecognised command: "${command}"<br>Try "help" for a list of valid commands.`);
      }
    }

    function speakToNPC() {
  const room = rooms[state.currentRoom];
  if (room.npcs.length === 0) {
    appendOutput('There is no one here to speak to.');
  } else {
    const npc = room.npcs[0];
    const dialogue = npcDialogues[npc];
    if (Array.isArray(dialogue)) {
      currentDialogue = npc;
      dialogue.forEach(line => appendOutput(line));
    } else {
      appendOutput(dialogue);
    }
  }
} else {
    room.npcs.forEach(npc => {
      const dialogue = npcDialogues[npc];
      if (Array.isArray(dialogue)) {
        dialogue.forEach(line => appendOutput(line));
      } else {
        appendOutput(dialogue);
      }
    });
  }
} else {
        room.npcs.forEach(npc => {
          appendOutput(npcDialogues[npc] || `${npc} has nothing to say right now.`);
        });
      }
    }

    function handleDialogueResponse(choice) {
  let response = '';
  switch(currentDialogue) {
    case 'Watcher':
      if (choice === '1') response = 'The Watcher nods. "Then you understand."';
      else if (choice === '2') response = 'The Watcher tilts its head. "Perhaps one day you will."';
      else if (choice === '3') response = 'The Watcher vanishes without a sound.';
      break;
    case 'Morthos':
      if (choice === '1') response = 'Morthos smiles. "Then we’ll begin immediately."';
      else if (choice === '2') response = 'Morthos grunts. "You may not like them."';
      else if (choice === '3') response = 'Morthos narrows his eyes. "I was about to ask you the same."';
      break;
  }
  appendOutput(response);
  currentDialogue = null;
}

$1
      const room = rooms[state.currentRoom];
      if (room.exits[direction]) {
        state.currentRoom = room.exits[direction];
        describeCurrentRoom();
      } else {
        appendOutput('You cannot go that way.');
      }
    }

    button.addEventListener('click', () => {
      const command = input.value;
      handleCommand(command);
      input.value = '';
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        button.click();
      } else if (e.key === 'ArrowUp') {
        handleCommand('north');
      } else if (e.key === 'ArrowDown') {
        handleCommand('south');
      } else if (e.key === 'ArrowLeft') {
        handleCommand('west');
      } else if (e.key === 'ArrowRight') {
        handleCommand('east');
      }
    });
  </script>
</body>
</html>
